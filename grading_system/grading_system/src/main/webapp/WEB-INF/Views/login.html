<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scholr – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #2563EB;
    --blue-dark: #1D4ED8;
    --blue-light: #DBEAFE;
    --text: #1e293b;
    --muted: #94a3b8;
    --border: #e2e8f0;
    --bg: #EFF6FF;
    --card: #ffffff;
    --shadow: 0 20px 60px rgba(37,99,235,0.12), 0 4px 20px rgba(0,0,0,0.06);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: drift 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 420px; height: 420px; background: #93c5fd; top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 320px; height: 320px; background: #60a5fa; bottom: -80px; right: -60px; animation-delay: -4s; }
  .blob-3 { width: 200px; height: 200px; background: #bfdbfe; top: 50%; left: 60%; animation-delay: -8s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border-radius: 28px;
    padding: 44px 40px 36px;
    width: 380px;
    box-shadow: var(--shadow);
    animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
    animation: fadeDown 0.5s ease 0.2s both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-icon {
    width: 64px; height: 64px;
    background: var(--blue);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    box-shadow: 0 8px 24px rgba(37,99,235,0.35);
    animation: iconPop 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .logo-icon:hover { transform: rotate(-8deg) scale(1.08); box-shadow: 0 12px 32px rgba(37,99,235,0.45); }

  @keyframes iconPop {
    from { opacity: 0; transform: scale(0.4) rotate(20deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .logo-icon svg { width: 32px; height: 32px; fill: white; }

  .logo-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo-sub {
    font-size: 14px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Role tabs */
  .role-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 10px;
    animation: fadeUp 0.5s ease 0.4s both;
  }

  .role-tabs {
    display: flex;
    background: #f1f5f9;
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 24px;
    gap: 4px;
    animation: fadeUp 0.5s ease 0.45s both;
  }

  .role-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 8px;
    border-radius: 10px;
    cursor: pointer;
    border: none;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }

  .role-tab::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    border-radius: 10px;
    opacity: 0;
    transform: scale(0.7);
    transition: all 0.3s ease;
    z-index: -1;
  }

  .role-tab.active {
    background: var(--blue);
    color: white;
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
    transform: scale(1.03);
  }
  .role-tab:not(.active):hover {
    background: white;
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transform: scale(1.01);
  }
  .role-tab svg { width: 20px; height: 20px; transition: transform 0.3s ease; }
  .role-tab.active svg { transform: scale(1.15); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Form */
  .field {
    margin-bottom: 18px;
    animation: fadeUp 0.5s ease both;
  }
  .field:nth-child(1) { animation-delay: 0.5s; }
  .field:nth-child(2) { animation-delay: 0.58s; }

  .field-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    color: var(--muted);
    display: flex;
    transition: color 0.2s ease;
  }
  .input-icon svg { width: 18px; height: 18px; }

  .field input {
    width: 100%;
    padding: 13px 44px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: #fafcff;
    outline: none;
    transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
  }
  .field input::placeholder { color: var(--muted); }
  .field input:focus {
    border-color: var(--blue);
    background: white;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
  }
  .field input:focus ~ .input-icon,
  .input-wrap:focus-within .input-icon { color: var(--blue); }

  .eye-btn {
    position: absolute; right: 14px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); display: flex;
    transition: color 0.2s ease;
    padding: 0;
  }
  .eye-btn:hover { color: var(--blue); }
  .eye-btn svg { width: 18px; height: 18px; }

  /* Login button */
  .btn-login {
    width: 100%;
    padding: 15px;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(37,99,235,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    animation: fadeUp 0.5s ease 0.65s both;
    margin-top: 8px;
  }

  .btn-login::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width 0.5s ease, height 0.5s ease, opacity 0.5s ease;
    opacity: 0;
  }

  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,99,235,0.45); background: var(--blue-dark); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:active::before { width: 300px; height: 300px; opacity: 0; }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0 18px;
    animation: fadeUp 0.5s ease 0.7s both;
  }

  /* Register link */
  .register-row {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    animation: fadeUp 0.5s ease 0.75s both;
  }
  .register-row a {
    color: var(--blue);
    text-decoration: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    position: relative;
  }
  .register-row a::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--blue);
    transform: scaleX(0);
    transition: transform 0.25s ease;
    transform-origin: left;
  }
  .register-row a:hover::after { transform: scaleX(1); }

  /* Floating particles */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: var(--blue);
    opacity: 0.07;
    animation: float linear infinite;
  }

  @keyframes float {
    from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.1; }
    90%  { opacity: 0.07; }
    to   { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Background blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <!-- Graduation cap SVG -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L1 9l4 2.18V15c0 1.66 3.13 3 7 3s7-1.34 7-3v-3.82L23 9 12 3zm0 2.24L19.5 9 12 12.76 4.5 9 12 5.24zM18 14.09c0 .66-2.69 1.91-6 1.91s-6-1.25-6-1.91v-2.27l6 3.27 6-3.27v2.27zm1 4.91v-4l2-1.09V19c0 .55-.45 1-1 1s-1-.45-1-1z"/>
      </svg>
    </div>
    <div class="logo-title">Scholr</div>
    <div class="logo-sub">Sign in to continue</div>
  </div>

  <!-- Role selector -->
  <div class="role-label">Select Role</div>
  <div class="role-tabs" role="tablist">
    <button class="role-tab active" role="tab" onclick="selectRole(this)" aria-selected="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l4 2.18V15c0 1.66 3.13 3 7 3s7-1.34 7-3v-3.82L23 9 12 3z"/></svg>
      Student
    </button>
    <button class="role-tab" role="tab" onclick="selectRole(this)" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05C16.19 13.7 17 14.7 17 16.5V19h5v-2.5c0-2.33-4.67-3.5-6-3.5z"/></svg>
      Teacher
    </button>
    <button class="role-tab" role="tab" onclick="selectRole(this)" aria-selected="false">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v1h16v-1c0-2.66-5.33-4-8-4zm7-6h2v2h-2zm0 4h2v2h-2z"/></svg>
      Admin
    </button>
  </div>

  <!-- Fields -->
  <div class="field">
    <label class="field-label" for="email">Email</label>
    <div class="input-wrap">
      <span class="input-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </span>
      <input type="email" id="email" placeholder="your.email@example.com" autocomplete="email"/>
    </div>
  </div>

  <div class="field">
    <label class="field-label" for="password">Password</label>
    <div class="input-wrap">
      <span class="input-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </span>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
      <button class="eye-btn" onclick="togglePassword()" type="button" aria-label="Toggle password visibility">
        <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn-login" onclick="handleLogin(this)">Login</button>

  <hr class="divider"/>

  <p class="register-row">Don't have an account? <a href="#">Register</a></p>
</div>

<script>
  // Role tab selection
  function selectRole(el) {
    document.querySelectorAll('.role-tab').forEach(t => {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
    });
    el.classList.add('active');
    el.setAttribute('aria-selected', 'true');
  }

  // Password toggle
  let pwVisible = false;
  function togglePassword() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    pwVisible = !pwVisible;
    inp.type = pwVisible ? 'text' : 'password';
    icon.innerHTML = pwVisible
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>`;
  }

  // Login button with ripple + shake on empty
  function handleLogin(btn) {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value.trim();
    if (!email || !pass) {
      btn.style.animation = 'none';
      btn.offsetHeight; // reflow
      btn.style.animation = 'shake 0.4s ease';
      btn.style.background = '#ef4444';
      setTimeout(() => {
        btn.style.background = '';
        btn.style.animation = '';
      }, 1200);
      return;
    }
    btn.textContent = 'Signing in…';
    btn.style.opacity = '0.85';
    setTimeout(() => {
      btn.textContent = '✓ Welcome back!';
      btn.style.background = '#16a34a';
      btn.style.opacity = '1';
      setTimeout(() => {
        btn.textContent = 'Login';
        btn.style.background = '';
      }, 2000);
    }, 1400);
  }

  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 12 + 4;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*14+10}s;
      animation-delay:${Math.random()*-20}s;
    `;
    container.appendChild(p);
  }
</script>

<style>
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
</style>
</body>
</html>
