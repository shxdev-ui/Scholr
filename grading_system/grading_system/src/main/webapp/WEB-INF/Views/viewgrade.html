<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scholr – View My Grades</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --blue:#2563EB;
  --blue-dark:#1D4ED8;
  --blue-light:#EFF6FF;
  --blue-mid:#DBEAFE;
  --pass:#16a34a; --pass-bg:#dcfce7;
  --fail:#dc2626; --fail-bg:#fee2e2;
  --excel:#d97706; --excel-bg:#fef3c7;
  --text:#1e293b; --muted:#94a3b8;
  --border:#e2e8f0; --card:#fff;
  --bg:#EFF6FF;
  --shadow:0 24px 64px rgba(37,99,235,.12),0 4px 20px rgba(0,0,0,.05);
}

body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden;position:relative}

/* blobs */
.blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.28;animation:drift 14s ease-in-out infinite alternate;pointer-events:none;z-index:0}
.b1{width:500px;height:500px;background:#93c5fd;top:-160px;left:-120px;animation-delay:0s}
.b2{width:360px;height:360px;background:#60a5fa;bottom:-100px;right:-80px;animation-delay:-5s}
.b3{width:220px;height:220px;background:#bfdbfe;top:45%;left:62%;animation-delay:-9s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(28px,18px) scale(1.07)}}

.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 20px 72px}

/* ── header ── */
.header{display:flex;align-items:center;gap:14px;margin-bottom:40px;animation:slideDown .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes slideDown{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:translateY(0)}}
.logo-icon{width:56px;height:56px;background:var(--blue);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(37,99,235,.38);flex-shrink:0;transition:transform .2s}
.logo-icon:hover{transform:rotate(-8deg) scale(1.08)}
.logo-icon svg{width:28px;height:28px;fill:white}
.header h1{font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;letter-spacing:-.5px}
.header p{font-size:13px;color:var(--muted);margin-top:1px}

/* ── lookup card ── */
.lookup-card{
  background:var(--card);border-radius:28px;padding:40px 36px 36px;
  width:100%;max-width:460px;
  box-shadow:var(--shadow);
  animation:cardIn .65s cubic-bezier(.34,1.56,.64,1) .1s both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.lookup-card h2{font-family:'Nunito',sans-serif;font-weight:800;font-size:20px;margin-bottom:4px}
.lookup-card .sub{font-size:13px;color:var(--muted);margin-bottom:28px}

.field{margin-bottom:18px}
.field label{display:block;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px}
.input-wrap{position:relative;display:flex;align-items:center}
.input-icon{position:absolute;left:14px;color:var(--muted);display:flex;pointer-events:none;transition:color .2s}
.input-icon svg{width:18px;height:18px}
.field input{
  width:100%;padding:13px 14px 13px 44px;
  border:2px solid var(--border);border-radius:13px;
  font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);
  background:#fafcff;outline:none;
  transition:border-color .22s,box-shadow .22s,background .22s;
}
.field input::placeholder{color:#c4cdd9}
.field input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,.1)}
.field input:focus + .input-icon, .input-wrap:focus-within .input-icon{color:var(--blue)}

.btn-search{
  width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:14px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;letter-spacing:.2px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 6px 20px rgba(37,99,235,.38);
  transition:transform .2s,box-shadow .2s,background .2s;
  position:relative;overflow:hidden;margin-top:8px;
}
.btn-search:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(37,99,235,.45);background:var(--blue-dark)}
.btn-search:active{transform:translateY(0)}
.btn-search svg{width:19px;height:19px}

/* spinner */
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* error */
.error-msg{display:none;background:var(--fail-bg);color:var(--fail);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:600;margin-top:16px;animation:fadeUp .3s ease both;display:none;align-items:center;gap:8px}
.error-msg svg{width:18px;height:18px;flex-shrink:0}

/* ── results card ── */
.result-card{
  background:var(--card);border-radius:28px;padding:36px;
  width:100%;max-width:720px;
  box-shadow:var(--shadow);
  margin-top:28px;
  display:none;
  animation:cardIn .6s cubic-bezier(.34,1.56,.64,1) both;
}

/* student banner */
.student-banner{
  display:flex;align-items:center;gap:18px;
  background:linear-gradient(135deg,var(--blue) 0%,#1e40af 100%);
  border-radius:18px;padding:22px 24px;margin-bottom:28px;color:#fff;
}
.student-avatar{
  width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;
  border:2px solid rgba(255,255,255,.4);
}
.student-banner h3{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;margin-bottom:2px}
.student-banner p{font-size:13px;opacity:.8}
.banner-meta{margin-left:auto;text-align:right;font-size:12px;opacity:.75;line-height:1.7}

/* section title */
.sec-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--blue-mid)}

/* table */
.table-wrap{overflow-x:auto;border-radius:16px;border:1.5px solid var(--border);margin-bottom:24px}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--blue-light)}
thead th{font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--blue);padding:13px 16px;text-align:left;white-space:nowrap}
tbody tr{border-top:1px solid var(--border);transition:background .15s;animation:fadeUp .4s ease both}
tbody tr:hover{background:#f8faff}
tbody td{padding:13px 16px;font-size:14px}
.grade-chip{display:inline-block;padding:3px 12px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;background:var(--blue-mid);color:var(--blue)}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px}
.s-pass{background:var(--pass-bg);color:var(--pass)}
.s-fail{background:var(--fail-bg);color:var(--fail)}
.s-excel{background:var(--excel-bg);color:var(--excel)}

/* summary strip */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:500px){.summary{grid-template-columns:1fr 1fr}}
.sum-box{background:var(--blue-light);border-radius:16px;padding:16px;text-align:center}
.sum-box strong{display:block;font-family:'Nunito',sans-serif;font-weight:900;font-size:26px;color:var(--blue);line-height:1}
.sum-box span{font-size:11px;color:var(--muted);margin-top:3px;display:block}

/* overall remark banner */
.remark-bar{border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;margin-bottom:24px}
.remark-bar svg{width:22px;height:22px;flex-shrink:0}

/* download */
.btn-dl{
  width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:14px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 5px 18px rgba(37,99,235,.35);
  transition:transform .2s,box-shadow .2s,background .2s;
  position:relative;overflow:hidden;
}
.btn-dl:hover{transform:translateY(-2px);box-shadow:0 9px 26px rgba(37,99,235,.42);background:var(--blue-dark)}
.btn-dl svg{width:18px;height:18px;transition:transform .25s}
.btn-dl:hover svg{transform:translateY(3px)}

/* ripple */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.28);transform:scale(0);animation:ripple .55s linear;pointer-events:none}
@keyframes ripple{to{transform:scale(4);opacity:0}}

/* toast */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1e293b;color:#fff;padding:11px 22px;border-radius:40px;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18V15c0 1.66 3.13 3 7 3s7-1.34 7-3v-3.82L23 9 12 3zm0 2.24L19.5 9 12 12.76 4.5 9 12 5.24zM18 14.09c0 .66-2.69 1.91-6 1.91s-6-1.25-6-1.91v-2.27l6 3.27 6-3.27v2.27z"/></svg>
    </div>
    <div>
      <h1>Scholr</h1>
      <p>Student Grade Portal</p>
    </div>
  </div>

  <!-- ── Lookup Form ── -->
  <div class="lookup-card">
    <h2>View Your Grades</h2>
    <p class="sub">Enter your details below to retrieve your result from the database.</p>

    <div class="field">
      <label>Student Name</label>
      <div class="input-wrap">
        <input type="text" id="inName" placeholder="e.g. Ayesha Khan" autocomplete="name"/>
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
        </span>
      </div>
    </div>

    <div class="field">
      <label>Roll Number</label>
      <div class="input-wrap">
        <input type="text" id="inRoll" placeholder="e.g. 2024-CS-042" autocomplete="off"/>
        <span class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        </span>
      </div>
    </div>

    <button class="btn-search" id="searchBtn" onclick="fetchGrades()">
      <span id="btnLabel">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search My Grades
      </span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="errorText">No record found. Please check your details.</span>
    </div>
  </div>

  <!-- ── Results Card ── -->
  <div class="result-card" id="resultCard">

    <!-- Student Banner -->
    <div class="student-banner" id="studentBanner">
      <div class="student-avatar" id="avatarInitial">AK</div>
      <div>
        <h3 id="resName">—</h3>
        <p id="resRoll">Roll No: —</p>
      </div>
      <div class="banner-meta" id="bannerMeta"></div>
    </div>

    <!-- Overall Remark -->
    <div class="remark-bar" id="remarkBar"></div>

    <!-- Summary -->
    <div class="summary" id="summaryRow"></div>

    <!-- Grades Table -->
    <div class="sec-title">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--blue)"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      Subject-wise Results
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="resBody"></tbody>
      </table>
    </div>

    <!-- Download -->
    <button class="btn-dl" id="dlBtn" onclick="downloadReport(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download Marks Report
    </button>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="#4ade80"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  <span id="toastMsg">Done!</span>
</div>

<script>
/*
 * ─────────────────────────────────────────────────────────────
 *  MOCK DATABASE
 *  Replace this with your real API / database call inside
 *  fetchGrades() where it says "// TODO: replace with real API"
 *  Expected shape per student:
 *  {
 *    name: string,
 *    roll: string,
 *    class: string,
 *    year: string,
 *    subjects: [{ name, marks, grade }]
 *  }
 * ─────────────────────────────────────────────────────────────
 */
const MOCK_DB = [
  {
    name:"Ayesha Khan", roll:"2024-CS-042", class:"Grade 10 – A", year:"2024–25",
    subjects:[
      {name:"Mathematics",      marks:88, grade:"A+"},
      {name:"Physics",          marks:74, grade:"B+"},
      {name:"Chemistry",        marks:91, grade:"A+"},
      {name:"English",          marks:65, grade:"B"},
      {name:"Computer Science", marks:82, grade:"A"},
    ]
  },
  {
    name:"Ali Hassan", roll:"2024-CS-019", class:"Grade 10 – B", year:"2024–25",
    subjects:[
      {name:"Mathematics",      marks:44, grade:"F"},
      {name:"Physics",          marks:55, grade:"C"},
      {name:"Chemistry",        marks:62, grade:"B"},
      {name:"English",          marks:78, grade:"B+"},
      {name:"Computer Science", marks:48, grade:"F"},
    ]
  },
  {
    name:"Sara Malik", roll:"2024-CS-007", class:"Grade 10 – A", year:"2024–25",
    subjects:[
      {name:"Mathematics",      marks:95, grade:"A+"},
      {name:"Physics",          marks:89, grade:"A"},
      {name:"Chemistry",        marks:93, grade:"A+"},
      {name:"English",          marks:88, grade:"A"},
      {name:"Computer Science", marks:97, grade:"A+"},
    ]
  }
];

function getStatus(m){
  if(m >= 80) return {label:"Excellent", cls:"s-excel", icon:"★"};
  if(m >= 60) return {label:"Pass",      cls:"s-pass",  icon:"✓"};
  return           {label:"Fail",      cls:"s-fail",  icon:"✗"};
}

let currentStudent = null;

async function fetchGrades(){
  const nameVal = document.getElementById('inName').value.trim().toLowerCase();
  const rollVal = document.getElementById('inRoll').value.trim().toLowerCase();

  if(!nameVal && !rollVal){
    showError("Please enter your name or roll number.");
    return;
  }

  setLoading(true);
  hideError();
  document.getElementById('resultCard').style.display = 'none';

  // ── TODO: replace with real API call ──────────────────────
  // Example:
  // const res = await fetch(`/api/grades?name=${nameVal}&roll=${rollVal}`);
  // const student = await res.json();
  // ──────────────────────────────────────────────────────────

  await new Promise(r => setTimeout(r, 1200)); // simulate network delay

  const student = MOCK_DB.find(s =>
    s.name.toLowerCase().includes(nameVal) ||
    s.roll.toLowerCase() === rollVal
  );

  setLoading(false);

  if(!student){
    showError("No record found. Please check your name or roll number.");
    return;
  }

  currentStudent = student;
  renderResult(student);
}

function renderResult(s){
  // Banner
  const initials = s.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('avatarInitial').textContent = initials;
  document.getElementById('resName').textContent = s.name;
  document.getElementById('resRoll').textContent = `Roll No: ${s.roll}`;
  document.getElementById('bannerMeta').innerHTML =
    `<span>${s.class}</span><br/><span>${s.year}</span>`;

  // Summary
  const total   = s.subjects.length;
  const avg     = Math.round(s.subjects.reduce((a,b)=>a+b.marks,0)/total);
  const passing = s.subjects.filter(x=>x.marks>=60).length;

  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-box" style="animation-delay:.05s">
      <strong>${total}</strong><span>Total Subjects</span>
    </div>
    <div class="sum-box" style="animation-delay:.12s">
      <strong>${avg}</strong><span>Average Marks</span>
    </div>
    <div class="sum-box" style="animation-delay:.19s">
      <strong>${passing}/${total}</strong><span>Subjects Passed</span>
    </div>
  `;

  // Overall remark bar
  const bar = document.getElementById('remarkBar');
  if(avg >= 80){
    bar.className = 'remark-bar';
    bar.style.cssText = 'background:var(--excel-bg);color:var(--excel)';
    bar.innerHTML = `<svg viewBox="0 0 24 24" fill="var(--excel)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> Overall Result: <strong>Excellent Performance</strong> — Keep it up!`;
  } else if(avg >= 60){
    bar.className = 'remark-bar';
    bar.style.cssText = 'background:var(--pass-bg);color:var(--pass)';
    bar.innerHTML = `<svg viewBox="0 0 24 24" fill="var(--pass)"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Overall Result: <strong>Pass</strong> — Good effort, keep improving!`;
  } else {
    bar.className = 'remark-bar';
    bar.style.cssText = 'background:var(--fail-bg);color:var(--fail)';
    bar.innerHTML = `<svg viewBox="0 0 24 24" fill="var(--fail)"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15" stroke="var(--fail)" stroke-width="2" stroke-linecap="round"/><line x1="9" y1="9" x2="15" y2="15" stroke="var(--fail)" stroke-width="2" stroke-linecap="round"/></svg> Overall Result: <strong>Needs Improvement</strong> — Please work harder.`;
  }

  // Table
  const tbody = document.getElementById('resBody');
  tbody.innerHTML = '';
  s.subjects.forEach((sub, i) => {
    const st = getStatus(sub.marks);
    const tr = document.createElement('tr');
    tr.style.animationDelay = `${i * 0.07}s`;
    tr.innerHTML = `
      <td style="color:var(--muted);font-weight:700">${i+1}</td>
      <td style="font-weight:600">${esc(sub.name)}</td>
      <td>
        <strong style="font-family:'Nunito',sans-serif;font-size:16px">${sub.marks}</strong>
        <span style="color:var(--muted);font-size:12px">/100</span>
      </td>
      <td><span class="grade-chip">${sub.grade}</span></td>
      <td><span class="status-pill ${st.cls}">${st.icon} ${st.label}</span></td>
    `;
    tbody.appendChild(tr);
  });

  // Show card
  const card = document.getElementById('resultCard');
  card.style.display = 'block';
  setTimeout(()=> card.scrollIntoView({behavior:'smooth', block:'start'}), 100);
}

/* ── helpers ── */
function setLoading(on){
  document.getElementById('spinner').style.display  = on ? 'block' : 'none';
  document.getElementById('btnLabel').style.display = on ? 'none'  : 'flex';
  document.getElementById('searchBtn').disabled = on;
}
function showError(msg){
  const el = document.getElementById('errorMsg');
  document.getElementById('errorText').textContent = msg;
  el.style.display = 'flex';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
}
function hideError(){ document.getElementById('errorMsg').style.display = 'none'; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

/* Enter key support */
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') fetchGrades();
});

/* ── Download ── */
function downloadReport(btn){
  const s = currentStudent;
  if(!s) return;

  // ripple
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.5;
  r.style.cssText = `width:${size}px;height:${size}px;left:${event.clientX-rect.left-size/2}px;top:${event.clientY-rect.top-size/2}px`;
  btn.appendChild(r);
  setTimeout(()=>r.remove(), 600);

  const avg = Math.round(s.subjects.reduce((a,b)=>a+b.marks,0)/s.subjects.length);
  const overall = avg>=80?'Excellent':avg>=60?'Pass':'Needs Improvement';
  const rows = s.subjects.map((sub,i)=>{
    const st = getStatus(sub.marks);
    return `<tr>
      <td>${i+1}</td><td>${esc(sub.name)}</td>
      <td style="text-align:center"><strong>${sub.marks}</strong>/100</td>
      <td style="text-align:center">${sub.grade}</td>
      <td style="text-align:center;color:${sub.marks>=80?'#d97706':sub.marks>=60?'#16a34a':'#dc2626'};font-weight:700">${st.label}</td>
    </tr>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
  <style>
    body{font-family:'Segoe UI',sans-serif;padding:40px;color:#1e293b}
    h1{color:#2563EB;font-size:26px;margin-bottom:2px}.sub{color:#94a3b8;font-size:13px;margin-bottom:20px}
    .info{display:flex;flex-wrap:wrap;gap:24px;background:#EFF6FF;padding:16px 20px;border-radius:12px;margin-bottom:24px}
    .info div label{font-size:11px;text-transform:uppercase;color:#94a3b8;font-weight:700;letter-spacing:.4px}
    .info div p{font-size:14px;font-weight:600;margin-top:2px}
    table{width:100%;border-collapse:collapse}
    th{background:#2563EB;color:#fff;padding:11px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
    td{padding:11px 14px;border-bottom:1px solid #e2e8f0;font-size:13px}
    tr:last-child td{border:none} tr:nth-child(even){background:#f8faff}
    .summary{display:flex;gap:16px;margin-top:20px}
    .sc{flex:1;background:#EFF6FF;border-radius:12px;padding:14px;text-align:center}
    .sc strong{display:block;font-size:24px;font-weight:900;color:#2563EB}
    .sc span{font-size:11px;color:#94a3b8;margin-top:3px;display:block}
    .footer{text-align:center;margin-top:28px;color:#cbd5e1;font-size:11px}
    @media print{body{padding:16px}}
  </style></head><body>
  <h1>📋 Grade Report</h1>
  <p class="sub">Scholr Academic Platform — Official Result</p>
  <div class="info">
    <div><label>Student Name</label><p>${esc(s.name)}</p></div>
    <div><label>Roll No.</label><p>${esc(s.roll)}</p></div>
    <div><label>Class</label><p>${esc(s.class)}</p></div>
    <div><label>Year</label><p>${esc(s.year)}</p></div>
    <div><label>Generated</label><p>${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</p></div>
  </div>
  <table><thead><tr><th>#</th><th>Subject</th><th>Marks</th><th>Grade</th><th>Status</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <div class="summary">
    <div class="sc"><strong>${s.subjects.length}</strong><span>Subjects</span></div>
    <div class="sc"><strong>${avg}</strong><span>Average</span></div>
    <div class="sc"><strong style="font-size:16px">${overall}</strong><span>Remark</span></div>
  </div>
  <p class="footer">Generated by Scholr • ${new Date().toLocaleString()}</p>
  </body></html>`;

  const blob = new Blob([html],{type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${s.name.replace(/\s+/g,'_')}_Grade_Report.html`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✅ Report downloaded!');

  btn.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Downloaded!`;
  btn.style.background = '#16a34a';
  setTimeout(()=>{
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Marks Report`;
    btn.style.background = '';
  }, 2500);
}
</script>
